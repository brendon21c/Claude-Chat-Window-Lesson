<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #app {
      width: 700px;
      height: 85vh;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #333; }

    #reset-btn {
      font-size: 0.75rem;
      color: #888;
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
    }
    #reset-btn:hover { background: #f5f5f5; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background: #0070f3;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #f0f0f0;
      color: #222;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.streaming { opacity: 0.85; }

    form {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #eee;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    #input:focus { border-color: #0070f3; }

    #send-btn {
      padding: 10px 18px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }
    #send-btn:disabled { background: #aaa; cursor: default; }
    #send-btn:hover:not(:disabled) { background: #005ecc; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Claude Chat</h1>
      <button id="reset-btn">New conversation</button>
    </header>
    <div id="messages"></div>
    <form id="chat-form">
      <textarea id="input" rows="1" placeholder="Message Claude..." required></textarea>
      <button id="send-btn" type="submit">Send</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const resetBtn = document.getElementById("reset-btn");

    function addMessage(role, text = "") {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      sendBtn.disabled = true;

      addMessage("user", text);
      const assistantDiv = addMessage("assistant");
      assistantDiv.classList.add("streaming");

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "[DONE]") {
            assistantDiv.classList.remove("streaming");
            sendBtn.disabled = false;
            break;
          }
          try {
            const { text: chunk } = JSON.parse(data);
            assistantDiv.textContent += chunk;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } catch (_) {}
        }
      }

      sendBtn.disabled = false;
    });

    // Auto-resize textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    // Submit on Enter (Shift+Enter for newline)
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event("submit"));
      }
    });

    resetBtn.addEventListener("click", async () => {
      await fetch("/reset", { method: "POST" });
      messagesEl.innerHTML = "";
    });
  </script>
</body>
</html>
